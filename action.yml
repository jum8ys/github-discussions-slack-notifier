name: GitHub Discussions Slack Notifier

description: Send Slack notifications when GitHub Discussions are created or discussed. Converts @mentions from GitHub to Slack automatically.

author: 'jum8ys'

branding:
  icon: 'bell'
  color: 'blue'

inputs:
  slack_webhook_url:
    description: 'Slack Incoming Webhook URL.'
    required: true
  github_to_slack_user_mapping_file:
    description: 'Path to JSON file with GitHub username to Slack user ID mapping.'
    required: false
    default: '.github/github-username-slack-mapping.json'
  github_to_slack_user_mapping_json:
    description: 'Inline JSON for GitHub username to Slack user ID mapping. If set, this takes precedence over github_to_slack_user_mapping_file.'
    required: false

runs:
  using: 'node24'
  main: 'dist/index.js'
