name: GitHub Discussions Slack Notifier

description: Send Slack notifications when GitHub Discussions are created or discussed. Converts @mentions from GitHub to Slack automatically.

author: 'jum8ys'

branding:
  icon: 'bell'
  color: 'blue'

inputs:
  slack_webhook_url:
    description: 'Slack Incoming Webhook URL. Pass from secrets: ${{ secrets.SLACK_WEBHOOK_URL }}'
    required: true
  slack_user_mapping_file_path:
    description: 'Path to JSON file with GitHub username to Slack user ID mapping.'
    required: false
    default: '.github/slack_user_mapping.json'
  slack_user_mapping_json:
    description: 'Inline JSON for GitHub username to Slack user ID mapping. If set, this takes precedence over slack_user_mapping_file_path. Pass from secrets: ${{ secrets.SLACK_USER_MAPPING_JSON }}'
    required: false

runs:
  using: 'node24'
  main: 'dist/index.js'
